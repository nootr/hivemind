name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: hivemind-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: hivemind-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: hivemind-aarch64-apple-darwin.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: hivemind-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.86.0
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bin hive --bin hivemind-node

      - name: Package Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/pkg
          cp "target/${{ matrix.target }}/release/hive" dist/pkg/
          cp "target/${{ matrix.target }}/release/hivemind-node" dist/pkg/
          cp README.md dist/pkg/
          tar -czf "dist/${{ matrix.archive }}" -C dist/pkg hive hivemind-node README.md

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/hive.exe" dist/pkg/
          Copy-Item "target/${{ matrix.target }}/release/hivemind-node.exe" dist/pkg/
          Copy-Item README.md dist/pkg/
          Compress-Archive -Path dist/pkg/* -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          find dist -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Publish assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="Prebuilt HIVEMIND binaries for Linux, macOS and Windows. See SHA256SUMS for checksums."
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "$notes"
          fi
          find dist -maxdepth 2 -type f -print0 | xargs -0 gh release upload "$TAG" --clobber
          gh release upload "$TAG" SHA256SUMS --clobber
